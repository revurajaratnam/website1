<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Header</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        .container{
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-inline: 2em 2em;
            padding: 20px 3em;
            background-image: url(../image.jpg);
            gap:1em;
            z-index: -1;

        }
        .container #menu{
            display:flex;
            list-style: none;
            color: white;
            padding: 10px 1em;
            padding-left:10em;
            gap:3em;
        }
        .container li:hover{
            cursor: pointer;
            color:rgb(161, 161, 161);
        }
        .container #src{
            color: rgb(56, 56, 56);
            background-image: url(../image.jpg);
            padding: 7px 7px;
            border-radius: 0.3em;
            border:solid 1px rgb(160, 159, 159);
        }
        .container #btn1{
            text-decoration: none;
            color: white;
            border: solid 0.055em white;
            padding-left: 20px;
            padding:0.5em 0.5em;
            border-radius: 0.2em;
            margin-left: 1em;
        }
         .container #btn2{
            text-decoration: none;
            color: black;
            background-color: gold;
            border: solid 0.1em black;
            padding:0.5em 0.5em;
            border-radius: 0.2em;
            margin-left: 1em;
        }
        .container #btn1:focus{
            box-shadow: 1px 1px 2px white;
            border: solid 3px rgb(207, 207, 207);
        }
        .container #btn2:focus{
            box-shadow: 1px 1px 2px rgb(250, 209, 3);
            border: solid 3px rgb(218, 184, 34);
        }
        .container #src:focus{
            box-shadow: 1px 2px 10px white;
            border: solid 3px rgb(202, 202, 202);
            border-radius:3px;
        }
        .container #btn1:hover{
            color:black;
            background-color: white;
        }   
          .container #btn2:hover{
            color:black;
            background-color: rgb(238, 206, 0);
        }   
        .hero{
            display: flex;
            align-items: center;
            justify-content: center;
            background: black;
            background-image: url(../image.jpg);
            background-size: cover;
            background-repeat:no-repeat;
            background-position: center;
            
        }
        .hero h1{
            text-align: center;
            color: white;
            font-size: 7em;
            text-shadow:1px 1px 20px black;
            margin-bottom: 1em;
        }
        .hero p{
            color: white;
            text-align: center;
            margin-bottom: 15.3em;
            font-size: 2em;
        }
        .content #btn3{
            color: white;
            text-align: center;
            border:solid 0.050em white;
            margin-bottom: 3em;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <ul id="menu">
            <li>Home</li>
            <li>Features</li>
            <li>Pricing</li>
            <li>FAQs</li>
            <li>About</li>
        </ul>
        <form>
            <input text="text" placeholder="Search..." id="src">
            <a href="#!" id="btn1">Login</a>
             <a href="#!" id="btn2">Sign-up</a>
        </form>
    </div>
    <div class="hero">
        <div class="content">
            <h1>Welcome Login Page</h1>
            <p>Life is like riding a bicycle. To keep your balance, you must keep moving.</p>
        </div>
    </div>
    
</body>
</html>
